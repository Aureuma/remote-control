name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            label: linux-amd64
            target: x86_64-unknown-linux-gnu
          - runner: macos-latest
            label: darwin-arm64
            target: aarch64-apple-darwin
          - runner: macos-latest
            label: darwin-amd64
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: |
          cargo build --release -p remote-control --target "${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/remote-control" "dist/remote-control-${{ matrix.label }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-control-${{ matrix.label }}
          path: dist/remote-control-${{ matrix.label }}
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -name "remote-control-*" -exec cp {} release/ \;
          ls -la release

      - name: Generate checksums
        run: |
          cd release
          shasum -a 256 remote-control-* > checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/remote-control-*
            release/checksums.txt
