name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  rust-test:
    name: Rust Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run main Rust test suite
        run: cargo test -- --test-threads=1 --skip run_stop_cleans_stale_session --skip websocket_readonly_blocks_input

      - name: Run stale session cleanup test
        run: cargo test run_stop_cleans_stale_session -- --test-threads=1

      - name: Run readonly websocket test
        run: cargo test websocket_readonly_blocks_input -- --test-threads=1

      - name: Build native release binary
        run: cargo build --release -p remote-control

      - name: Smoke test native release binary
        run: ./scripts/remote_control_smoke.sh ./.artifacts/cargo-target/release/remote-control "ci-${{ matrix.os }}" 18182

  browser-e2e:
    name: Browser E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install browser test deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run browser E2E
        run: npm run test:browser -- --project=${{ matrix.browser }}
